---
name: Release Fork Build
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      skip_bump:
        description: Skip version bump (build from current commit without bumping)
        required: false
        type: boolean
        default: false
permissions:
  contents: write
concurrency:
  group: release-fork
  cancel-in-progress: false
jobs:
  # ===========================================================================
  # Phase 1: Bump version and create tag (or use current ref)
  # ===========================================================================
  prepare-build:
    name: Prepare build context
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
      sha: ${{ steps.resolve.outputs.sha }}
      build_ref: ${{ steps.resolve.outputs.build_ref }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          submodules: recursive
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          package-manager-cache: false
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Bump version
        if: ${{ !inputs.skip_bump }}
        id: bump
        run: node scripts/release/bump-version.js ${{ inputs.bump }}
      - name: Resolve current version
        id: current_version
        shell: bash
        run: |
          VERSION=$(node -e "process.stdout.write(require('./app/package.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Compute tag
        id: tagname
        env:
          VERSION: ${{ steps.current_version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - name: Commit bump and tag
        if: ${{ !inputs.skip_bump }}
        env:
          VERSION: ${{ steps.current_version.outputs.version }}
          TAG: ${{ steps.tagname.outputs.tag }}
        run: |
          git add app/package.json app/src-tauri/tauri.conf.json app/src-tauri/Cargo.toml Cargo.toml
          git commit -m "chore(release): v${VERSION}" || echo "No version files changed"
          git push origin main
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
      - name: Resolve build outputs
        id: resolve
        shell: bash
        env:
          VERSION: ${{ steps.current_version.outputs.version }}
          TAG: ${{ steps.tagname.outputs.tag }}
        run: |
          SHA=$(git rev-parse HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          if [ "${{ inputs.skip_bump }}" = "true" ]; then
            echo "build_ref=main" >> "$GITHUB_OUTPUT"
          else
            echo "build_ref=$TAG" >> "$GITHUB_OUTPUT"
          fi

  # ===========================================================================
  # Phase 2: Build desktop binaries (Windows + Linux only, no macOS signing)
  # ===========================================================================
  build-desktop:
    name: "Build ${{ matrix.settings.artifact_suffix }}"
    needs: [prepare-build]
    runs-on: ${{ matrix.settings.platform }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - platform: ubuntu-22.04
            args: --target x86_64-unknown-linux-gnu --bundles deb appimage
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-x86_64
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OPENHUMAN_TELEGRAM_BOT_USERNAME: openhumanbot
      VITE_TELEGRAM_BOT_USERNAME: openhumanbot
    steps:
      - name: Checkout build ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-build.outputs.build_ref }}
          fetch-depth: 1
          submodules: recursive
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true
      - name: Setup Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.93.0
      - name: Install Tauri dependencies (ubuntu)
        if: matrix.settings.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf cmake libasound2-dev libxdo-dev libxtst-dev libx11-dev libxi-dev \
            libevdev-dev libssl-dev libclang-dev \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libatspi2.0-0 libxshmfence1 libu2f-udev

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache CEF (unix)
        if: matrix.settings.platform == 'ubuntu-22.04'
        uses: actions/cache@v5
        with:
          path: ~/.cache/tauri-cef
          key: cef-${{ matrix.settings.target }}-${{ hashFiles('app/src-tauri/Cargo.toml') }}
          restore-keys: cef-${{ matrix.settings.target }}-

      - name: Cache CEF (windows)
        if: matrix.settings.platform == 'windows-latest'
        uses: actions/cache@v5
        with:
          path: ~/AppData/Local/tauri-cef
          key: cef-${{ matrix.settings.target }}-${{ hashFiles('app/src-tauri/Cargo.toml') }}
          restore-keys: cef-${{ matrix.settings.target }}-

      - name: Cache vendored tauri-cli (unix)
        if: matrix.settings.platform == 'ubuntu-22.04'
        id: tauri-cli-cache-unix
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: vendored-tauri-cli-${{ runner.os }}-${{ hashFiles('app/src-tauri/vendor/tauri-cef/crates/tauri-cli/Cargo.toml') }}

      - name: Cache vendored tauri-cli (windows)
        if: matrix.settings.platform == 'windows-latest'
        id: tauri-cli-cache-windows
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-tauri.exe
          key: vendored-tauri-cli-${{ runner.os }}-${{ hashFiles('app/src-tauri/vendor/tauri-cef/crates/tauri-cli/Cargo.toml') }}

      - name: Install vendored tauri-cli
        if: >
          (matrix.settings.platform == 'windows-latest' && steps.tauri-cli-cache-windows.outputs.cache-hit != 'true')
          || (matrix.settings.platform != 'windows-latest' && steps.tauri-cli-cache-unix.outputs.cache-hit != 'true')
        shell: bash
        run: cargo install --locked --path app/src-tauri/vendor/tauri-cef/crates/tauri-cli

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package Tauri app
        id: tauri-build
        shell: bash
        working-directory: app
        env:
          OPENHUMAN_APP_ENV: production
          VITE_OPENHUMAN_APP_ENV: production
          VITE_BACKEND_URL: https://api.openhuman.ai/
          VITE_BUILD_SHA: ${{ needs.prepare-build.outputs.sha }}
          MATRIX_ARGS: ${{ matrix.settings.args }}
        run: |
          if [ "${RUNNER_OS}" = "Linux" ]; then
            echo "[appimage-fix] linux split build: compile first to fetch CEF"
            NODE_OPTIONS="--max-old-space-size=8192" cargo tauri build --no-bundle $MATRIX_ARGS
            CEF_LIB_DIR="$(find "$HOME/.cache/tauri-cef" -name libcef.so -printf '%h\n' 2>/dev/null | head -1)"
            if [ -z "$CEF_LIB_DIR" ]; then
              echo "::error::libcef.so not found"
              exit 1
            fi
            export LD_LIBRARY_PATH="$CEF_LIB_DIR${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          fi
          NODE_OPTIONS="--max-old-space-size=8192" cargo tauri build $MATRIX_ARGS

      - name: Upload bundles as artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-bundles-${{ matrix.settings.artifact_suffix }}
          path: |
            app/src-tauri/target/${{ matrix.settings.target }}/release/bundle/**
            target/${{ matrix.settings.target }}/release/bundle/**

  # ===========================================================================
  # Phase 3: Create GitHub Release and upload all artifacts
  # ===========================================================================
  create-release:
    name: Create GitHub Release
    needs: [prepare-build, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        shell: bash
        run: |
          echo "==> Artifacts:"
          find artifacts -type f -ls

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-build.outputs.tag }}
          name: ${{ needs.prepare-build.outputs.tag }}
          body: |
            ## 安装包 / Installers

            **Windows:**
            - `.msi` — 双击安装
            - `.exe` — NSIS 安装程序

            **Linux:**
            - `.deb` — Debian/Ubuntu 安装包
            - `.AppImage` — 通用 Linux 应用镜像

            ## 说明

            这是 OpenHuman 中文版的非官方构建。包含了完整的简体中文 (zh-CN) 界面本地化。

            ### 安装方法

            **Windows:** 下载 `.msi` 或 `.exe` 文件，双击运行。Windows 可能会显示 SmartScreen 警告（未签名），点击"更多信息" → "仍要运行"。

            **Linux (Ubuntu/Debian):**
            ```bash
            sudo dpkg -i openhuman_*.deb
            ```

            **Linux (AppImage):**
            ```bash
            chmod +x openhuman_*.AppImage
            ./openhuman_*.AppImage
            ```

            > 注意：此构建未经过代码签名。如需自动更新功能，请自行生成 Tauri updater 密钥对并更新 `tauri.conf.json` 中的 `pubkey`。
          draft: false
          files: |
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.msi
            artifacts/**/*-setup.exe
            artifacts/**/*.AppImage.tar.gz
